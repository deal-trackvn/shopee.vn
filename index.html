<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Săn Deal Timon Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm p-4 mx-auto" style="max-width: 600px;">
        <h3 class="text-center mb-4">🔍 MÁY CÀY TIMON SEARCH</h3>
        <div class="input-group mb-3">
            <input type="text" id="shopeeInput" class="form-control" placeholder="Nhập tên sản phẩm...">
            <button class="btn btn-danger" onclick="sendRequest()">PHÂN TÍCH</button>
        </div>
        <div id="status" class="text-center d-none my-3">
            <div class="spinner-border text-danger"></div>
            <p>Máy cày ở nhà đang làm việc...</p>
        </div>
        <div id="searchItemsContainer"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBB9RoTHWPhlcZkOlDSyOgZAqZMZyDn-g4",
        authDomain: "timonaffiliate-d7849.firebaseapp.com",
        databaseURL: "https://timonaffiliate-d7849-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "timonaffiliate-d7849",
        storageBucket: "timonaffiliate-d7849.firebasestorage.app",
        messagingSenderId: "863747128310",
        appId: "1:863747128310:web:70b49c76b6bdc09b5c25d7"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function sendRequest() {
        const keyword = document.getElementById('shopeeInput').value.trim();
        if (!keyword) return;

        const requestId = Date.now();
        console.log("👉 [1] Đã bấm nút. Gửi ID:", requestId);

        document.getElementById('status').classList.remove('d-none');
        document.getElementById('searchItemsContainer').innerHTML = '';

        // Gửi lệnh vào nhánh requests
        database.ref('requests/' + requestId).set({
            keyword: keyword,
            status: 'pending'
        }).then(() => {
            console.log("👉 [2] Đã đẩy keyword lên Firebase thành công!");
        });

        // Đợi hàng về ở nhánh results
        database.ref('results/' + requestId).on('value', (snapshot) => {
            const data = snapshot.val();
            console.log("👉 [3] Kiểm tra Firebase Results:", data);

            if (data && data.products) {
                console.log("👉 [4] Đã thấy danh sách sản phẩm! Đang vẽ ra web...");
                document.getElementById('status').classList.add('d-none');
                renderResults(data.products);
                database.ref('results/' + requestId).off();
            }
        });
    }

    function renderResults(products) {
        let html = '<hr><h5>Kết quả tìm được:</h5>';
        products.forEach(p => {
            html += `<div class="p-2 border-bottom">
                <b>${p.name}</b> <br>
                <span class="text-danger">Giá: ₫${p.price}</span> <br>
                <a href="${p.aff_link}" target="_blank" class="btn btn-sm btn-outline-danger mt-1">Xem chi tiết</a>
            </div>`;
        });
        document.getElementById('searchItemsContainer').innerHTML = html;
    }
</script>
</body>
</html>
