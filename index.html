<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Phân Tích Deal Shopee - Timon Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --shopee-orange: #ee4d2d; --tech-blue: #003366; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .tool-card { max-width: 800px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 6px solid var(--shopee-orange); }
        .btn-shopee { background-color: var(--shopee-orange); color: white; border: none; font-weight: bold; }
        #searchItemsContainer { margin-top: 20px; }
        .product-item { background: #fdfdfd; border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; text-align: left; }
        .price-text { color: var(--shopee-orange); font-weight: bold; }
    </style>
</head>
<body>

<div class="container text-center">
    <div class="tool-card">
        <h2 class="mb-4">🔍 HỆ THỐNG PHÂN TÍCH DEAL SHOPEE</h2>
        <div class="input-group mb-3">
            <input type="text" id="shopeeInput" class="form-control form-control-lg" placeholder="Nhập tên SP (vd: Camera, bcs...)">
            <button class="btn btn-shopee btn-lg px-4" onclick="sendRequest()">PHÂN TÍCH</button>
        </div>

        <div id="status" class="text-primary fw-bold my-3 d-none">
            <span class="spinner-border spinner-border-sm"></span> Đang kết nối máy chủ Timon Tech...
        </div>

        <div id="searchItemsContainer"></div>
    </div>
</div>

<script>
    // --- DÁN FIREBASE CONFIG CỦA ÔNG VÀO ĐÂY ---
    const firebaseConfig = {
  apiKey: "AIzaSyBB9RoTHWPhlcZkOlDSyOgZAqZMZyDn-g4",
  authDomain: "timonaffiliate-d7849.firebaseapp.com",
  projectId: "timonaffiliate-d7849",
  storageBucket: "timonaffiliate-d7849.firebasestorage.app",
  messagingSenderId: "863747128310",
  appId: "1:863747128310:web:70b49c76b6bdc09b5c25d7",
  measurementId: "G-1EYW657TB9"
};
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    async function sendRequest() {
        const keyword = document.getElementById('shopeeInput').value.trim();
        if (!keyword) return;

        const status = document.getElementById('status');
        const container = document.getElementById('searchItemsContainer');

        status.classList.remove('d-none');
        container.innerHTML = '';

        // 1. Gửi yêu cầu lên Firebase để con "Máy cày" ở nhà nhận lệnh
        const requestId = Date.now();
        database.ref('requests/' + requestId).set({
            keyword: keyword,
            status: 'pending',
            timestamp: requestId
        });

        // 2. Lắng nghe kết quả từ Firebase (Khi con máy cày cào xong thẩy lên)
        database.ref('results/' + requestId).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                status.classList.add('d-none');
                renderResults(data.products);
            }
        });
    }

    function renderResults(products) {
        const container = document.getElementById('searchItemsContainer');
        container.innerHTML = '';
        products.forEach(p => {
            container.innerHTML += `
                <div class="product-item">
                    <div class="flex-grow-1">
                        <div class="fw-bold text-dark">${p.name}</div>
                        <div class="price-text">đ ${p.price}</div>
                    </div>
                    <a href="${p.aff_link}" target="_blank" class="btn btn-sm btn-shopee">Mua ngay</a>
                </div>
            `;
        });
    }
</script>
</body>
</html>
