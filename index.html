<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máy Cày Timon Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --shopee: #ee4d2d; }
        body { background: #f4f4f4; padding-top: 50px; }
        .main-card { max-width: 650px; margin: auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid var(--shopee); }
        .product-box { border: 1px solid #eee; padding: 15px; border-radius: 10px; margin-top: 15px; text-align: left; display: flex; align-items: center; }
        .price { color: var(--shopee); font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card text-center">
        <h2 class="mb-4">🔍 HỆ THỐNG SOI DEAL TIMON</h2>
        <div class="input-group mb-3">
            <input type="text" id="keyword" class="form-control form-control-lg" placeholder="Nhập tên SP...">
            <button class="btn btn-danger btn-lg px-4" onclick="batDauCay()">TÌM NGAY</button>
        </div>
        <div id="status" class="d-none text-danger fw-bold my-3">
            <div class="spinner-border spinner-border-sm"></div> Đang đợi máy cày ở nhà nhả hàng...
        </div>
        <div id="results"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBB9RoTHWPhlcZkOlDSyOgZAqZMZyDn-g4",
        authDomain: "timonaffiliate-d7849.firebaseapp.com",
        databaseURL: "https://timonaffiliate-d7849-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "timonaffiliate-d7849",
        storageBucket: "timonaffiliate-d7849.firebasestorage.app",
        messagingSenderId: "863747128310",
        appId: "1:863747128310:web:70b49c76b6bdc09b5c25d7"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function batDauCay() {
        const kw = document.getElementById('keyword').value.trim();
        if (!kw) return;

        const requestId = Date.now();
        document.getElementById('status').classList.remove('d-none');
        document.getElementById('results').innerHTML = '';

        // 1. Web ra lệnh (Chỉ đẩy keyword lên)
        database.ref('requests/' + requestId).set({ keyword: kw, status: 'pending' });
        console.log("🚀 Đã ra lệnh cho máy cày ID:", requestId);

        // 2. Web ngồi hóng ở nhánh 'results'
        database.ref('results/' + requestId).on('value', (snap) => {
            const data = snap.val();
            if (data && data.products) {
                console.log("✅ Hàng đã về tới Web!");
                document.getElementById('status').classList.add('d-none');
                hienThi(data.products);
                database.ref('results/' + requestId).off(); // Lấy xong nghỉ
            }
        });
    }

    function hienThi(products) {
        let html = '';
        products.forEach(p => {
            html += `<div class="product-box">
                <div class="flex-grow-1">
                    <div class="fw-bold">${p.name}</div>
                    <div class="price">₫${p.price}</div>
                </div>
                <a href="${p.link}" target="_blank" class="btn btn-outline-danger btn-sm">XEM NGAY</a>
            </div>`;
        });
        document.getElementById('results').innerHTML = html;
    }
</script>
</body>
</html>
