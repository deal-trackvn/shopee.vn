<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Săn Deal Shopee - Timon Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --shopee-orange: #ee4d2d; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .tool-card { max-width: 700px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--shopee-orange); }
        .btn-shopee { background-color: var(--shopee-orange); color: white; border: none; font-weight: bold; }
        .btn-shopee:hover { background-color: #d73211; color: white; }
        .product-item { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; text-align: left; }
        .price-text { color: var(--shopee-orange); font-size: 1.1rem; font-weight: bold; }
        .product-info { flex-grow: 1; }
    </style>
</head>
<body>

<div class="container">
    <div class="tool-card text-center">
        <h2 class="mb-4">🔍 HỆ THỐNG PHÂN TÍCH DEAL SHOPEE</h2>
        <div class="input-group mb-3">
            <input type="text" id="shopeeInput" class="form-control form-control-lg" placeholder="Ví dụ: Camera Imou, Sạc dự phòng...">
            <button class="btn btn-shopee px-4" onclick="sendRequest()">PHÂN TÍCH</button>
        </div>

        <div id="status" class="my-4 d-none">
            <div class="spinner-border text-danger" role="status"></div>
            <div class="mt-2 text-danger fw-bold">Máy cày Timon đang cào dữ liệu & gán mã Affiliate...</div>
        </div>

        <div id="searchItemsContainer" class="mt-4"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBB9RoTHWPhlcZkOlDSyOgZAqZMZyDn-g4",
        authDomain: "timonaffiliate-d7849.firebaseapp.com",
        databaseURL: "https://timonaffiliate-d7849-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "timonaffiliate-d7849",
        storageBucket: "timonaffiliate-d7849.firebasestorage.app",
        messagingSenderId: "863747128310",
        appId: "1:863747128310:web:70b49c76b6bdc09b5c25d7"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function sendRequest() {
        const keyword = document.getElementById('shopeeInput').value.trim();
        if (!keyword) return;

        const status = document.getElementById('status');
        const container = document.getElementById('searchItemsContainer');
        status.classList.remove('d-none');
        container.innerHTML = '';

        const requestId = Date.now();

        // 1. Gửi lệnh vào requests
        database.ref('requests/' + requestId).set({
            keyword: keyword,
            status: 'pending'
        });

        // 2. Lắng nghe tại nhánh results (Có thêm chữ 's')
        const resultRef = database.ref('results/' + requestId);
    
    resultRef.on('value', (snapshot) => {
        const data = snapshot.val();
        
        // Console log này để ní F12 xem dữ liệu nó "chảy" về web chưa
        console.log("Dữ liệu từ Firebase trả về:", data);

        if (data && data.products) {
            status.classList.add('d-none');
            renderResults(data.products);
            // Nhận được hàng rồi thì ngắt kết nối cho đỡ tốn tài nguyên
            resultRef.off();
        }
    });

function renderResults(products) {
        const container = document.getElementById('searchItemsContainer');
        container.innerHTML = '<h5 class="text-start mb-3">🔥 Kết quả soi Deal cho Timon:</h5>';
        products.forEach(p => {
            container.innerHTML += `
                <div class="product-item" style="border:1px solid #ddd; padding:15px; border-radius:10px; margin-bottom:10px; text-align:left;">
                    <div class="fw-bold">${p.name}</div>
                    <div style="color: #ee4d2d; font-weight: bold; font-size: 1.2rem;">₫${p.price}</div>
                    <div class="mt-2">
                        <a href="${p.aff_link}" target="_blank" class="btn btn-outline-danger btn-sm">LẤY LINK GỐC</a>
                        <small class="text-muted d-block mt-1">Dán link này vào App Aff để lấy hoa hồng ní nhé!</small>
                    </div>
                </div>`;
        });
    }
</script>
</body>
</html>
